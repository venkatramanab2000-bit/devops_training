name: Terraform Multi-Stage Workflow

on:
  push:
    branches: [ "main" ]

jobs:
  terraform-plan:
    name: Stage 1 - Terraform Plan
    runs-on: ubuntu-latest


steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

   - name: Terraform Init
     run: terraform init

     - name: Terraform Plan
        run: terraform plan


terraform-apply:
name: Stage 2 - Terraform Apply (Manual Approval)
runs-on: ubuntu-latest
needs: terraform-plan


environment:
  name: production   # 👈 This enables manual approval

steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Setup Terraform
    uses: hashicorp/setup-terraform@v3

  - name: Terraform Init
    run: terraform init

  - name: Terraform Plan
    run: terraform plan

  - name: Terraform Apply
    run: terraform apply -auto-approve

